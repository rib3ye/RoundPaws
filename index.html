<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Adventure of Round Paws</title>
    <link rel="stylesheet" href="css/game.css">
</head>
<body>
    <canvas id="game" width="448" height="224"></canvas>
    <div style="text-align:center; margin-top:8px;">
        <a href="editor.html" style="color:#888; font-family:monospace; font-size:12px; text-decoration:none;">Pixel Art Editor</a>
        <span style="color:#444; font-family:monospace; font-size:12px;"> · </span>
        <a href="level-editor.html" style="color:#e94560; font-family:monospace; font-size:12px; text-decoration:none;">Level Editor</a>
    </div>

    <script src="js/input.js"></script>
    <script src="js/sprites.js"></script>
    <script src="js/level.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/player.js"></script>
    <script src="js/enemies.js"></script>
    <script src="js/projectile.js"></script>
    <script src="js/title.js"></script>
    <script src="js/ending.js"></script>
    <script src="js/music.js"></script>
    <script src="js/main.js"></script>
    <script>
    // Live reload: poll for tile changes on localhost (every 2s)
    (function() {
        var h = location.hostname;
        if (h !== 'localhost' && h !== '127.0.0.1') return;
        var lastVersion = -1;
        function poll() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/api/tile-version');
            xhr.onload = function() {
                if (xhr.status === 200) {
                    var v = JSON.parse(xhr.responseText).version;
                    if (lastVersion === -1) {
                        lastVersion = v;
                    } else if (v !== lastVersion) {
                        lastVersion = v;
                        if (window.Game && Game.Sprites) {
                            console.log('[Live Reload] Tiles changed, reloading...');
                            Game.Sprites.clearCache();
                            Game.Sprites.loadImages(function() {
                                console.log('[Live Reload] Done');
                            });
                        }
                    }
                }
            };
            xhr.send();
        }
        setInterval(poll, 2000);
        poll();
    })();
    </script>
</body>
</html>
